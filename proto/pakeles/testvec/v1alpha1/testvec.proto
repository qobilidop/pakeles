// Conformance test vectors: the language-neutral contract every
// backend's test harness consumes. Generated by `pakeles testgen`,
// committed as artifacts, regenerated only deliberately.
syntax = "proto3";
package pakeles.testvec.v1alpha1;

// A finite bit sequence with explicit bit-granular length.
// Canonical form: data_hex is exactly ceil(bit_len/8) bytes of
// lowercase hex; when bit_len % 8 != 0 the trailing byte's unused
// low-order bits are zero (bits are MSB-first, matching extraction
// semantics). Readers canonicalize (pad short input with zeros,
// truncate long input, zero the pad bits) and never error; writers
// must emit canonical form; lint warns on non-canonical data.
message BitString {
  string data_hex = 1;
  uint64 bit_len = 2;
}

message TestSuite {
  string parser_name = 1;
  string ir_version = 2;
  repeated TestVector vectors = 3;
}

message TestVector {
  // Stable path-derived id (identical across regenerations of the
  // same IR), e.g. "parse_ethernet/arm0/parse_ipv4.options=32b/arm0".
  string id = 1;
  Category category = 2;
  BitString packet = 3;
  Expected expected = 4;
}

enum Category {
  CATEGORY_UNSPECIFIED = 0;
  CATEGORY_ACCEPT = 1;
  CATEGORY_REJECT = 2;
  CATEGORY_TRUNCATION = 3;
}

message Expected {
  oneof outcome {
    Accepted accept = 1;
    Rejected reject = 2;
  }
}

message Accepted {
  repeated ExpectedHeader headers = 1;
}

message Rejected {
  string reason = 1;
}

message ExpectedHeader {
  string instance = 1;
  repeated ExpectedField fields = 2;
}

message ExpectedField {
  string name = 1;
  oneof value {
    uint64 uint = 2;
    string bytes_hex = 3;
  }
}
